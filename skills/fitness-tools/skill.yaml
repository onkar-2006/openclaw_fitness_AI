name: fitness-tools
description: Tools for calculating fitness metrics like BMR and Macros.
tools:
  - name: calculate_macros
    description: Calculates daily protein and calorie targets based on weight and goal.
    parameters:
      type: object
      properties:
        weight:
          type: number
          description: User weight in kg.
        goal:
          type: string
          enum: [muscle, weight-loss]
    container:
      command: ["python3", "/app/skills/fitness-tools/coach_tools.py"]